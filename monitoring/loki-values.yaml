loki: 
  auth_enabled: false

  # 데이터 복제
  commonConfig:
    replication_factor: 1

  # 스토리지 형태 
  storage: 
    type: 'filesystem'

  persistence: 
    enabled: true
    storageClassName: "nfs-client"
    size: 20Gi

  # 로그 보관 기간 설정 (1주일 = 168h)
  config: 
    limits_config: 
      retention_period: 168h
    chunk_store_config: 
      max_look_back_period: 168h 
    table_manager: 
      # 보관 기간 지나면 자동 삭제 
      retention_deletes_enabled: true
      retention_period: 168h

promtail:
  enabled: true
  config: 
    clients: 
      - url: http://{{ .Release.Name }}:3100/loki/api/v1/push
