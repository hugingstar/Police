---
- name: 메일 서버 자동 구축
  hosts: mail_servers
  become: yes
  tasks:
    - name: 1. DNS 및 패키지 설치
      dnf:
        name: [dovecot, sendmail, sendmail-cf, m4]
        state: present

    - name: 2. Sendmail 메인 설정 (sendmail.cf)
      # 85번 행 Cw 도메인 입력 및 268번 행 127.0.0.1 제한 삭제
      shell: |
        sed -i 's/^Cw.*/Cw kojel.com/' /etc/mail/sendmail.cf
        sed -i 's/Addr=127.0.0.1, //' /etc/mail/sendmail.cf
      args:
        executable: /bin/bash

    - name: 3. Mail Access 설정 및 DB 생성
      blockinfile:
        path: /etc/mail/access
        block: |
          kojel.com           RELAY
          172.0.0             RELAY
      register: access_db

    - name: 4. Access DB 갱신 (makemap)
      shell: makemap hash /etc/mail/access < /etc/mail/access
      when: access_db.changed

    - name: 5. Dovecot 기본 설정 (dovecot.conf)
      # 24, 30, 33번 행 관련 주석 해제
      replace:
        path: /etc/dovecot/dovecot.conf
        regexp: '^#({{ item }})'
        replace: '\1'
      loop:
        - 'protocols = imap pop3 lmtp'
        - 'listen = \*, ::'
        - 'login_trusted_networks = 192.168.22.0/24' # 예시 대역

    - name: 6. Dovecot 인증 설정 (10-auth.conf)
      # 10번 행 평문 인증 허용 (yes -> no)
      lineinfile:
        path: /etc/dovecot/conf.d/10-auth.conf
        regexp: '^#?disable_plaintext_auth ='
        line: 'disable_plaintext_auth = no'

    - name: 7. Dovecot SSL 설정 (10-ssl.conf)
      # 8번 행 SSL 끄기 (yes -> no)
      lineinfile:
        path: /etc/dovecot/conf.d/10-ssl.conf
        regexp: '^ssl ='
        line: 'ssl = no'

    - name: 8. Dovecot 메일 경로 설정 (10-mail.conf)
      # 25번 주석 해제, 121번 mail 그룹, 166번 잠금 메소드
      lineinfile:
        path: /etc/dovecot/conf.d/10-mail.conf
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
      loop:
        - { regexp: '^#?mail_location =', line: 'mail_location = mbox:~/mail:INBOX=/var/mail/%u' }
        - { regexp: '^#?mail_privileged_group =', line: 'mail_privileged_group = mail' }
        - { regexp: '^#?dotlock_use_excl =', line: 'dotlock_use_excl = yes' }

    - name: 9. 모든 서비스 재시작
      service:
        name: "{{ item }}"
        state: restarted
        enabled: yes
      loop: [sendmail, dovecot]