---
- name : NFS 서버 설정 자동화
  hosts: all
  become: yes

  tasks:
  - name: 0. /root 디렉토리 접근 권한 허용 (상위 경로 개방)
    file:
       path: /root
       mode: '0755'
  - name: 1. NFS 관리 디렉토리 생성 (/root/nfs_node)
    file:
       path: /mnt/mail_storage/sent_items
       state: directory
       mode: '0755'
 

  - name: 2. /etc/exports 파일에 설정 추가
    lineinfile:
       path: /etc/exports
       line: "/mnt/mail_storage/sent_items *(rw,sync,no_subtree_check,no_root_squash)"
       create: yes
    register: exports_result

  - name: 3. NFS 서비스 시작 및 활성화 (systemctl start/enable)
    service:
       name: nfs-server
       state: started
       enabled: yes

  - name: 4. 설정 변경사항 적용 (exportfs- ra)
    command: exportfs -ra
    when: exports_result.changed

  - name: 5. NFS 서비스 재시작
    service:
      name: nfs-server
      state: restarted
    when: exports_result.changed