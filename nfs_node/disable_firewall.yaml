---
- name: Disable Firewall and Verify Status
  hosts: localhost
  become: yes

  tasks:
    - name: 1. 방화벽 서비스 중지 및 자동 시작 비활성화
      ansible.builtin.systemd:
        name: firewalld
        state: stopped
        enabled: no

    - name: 2. 방화벽 상세 상태 확인 (SubState 조회)
      ansible.builtin.command: systemctl show -p SubState firewalld
      register: fw_sub_status
      changed_when: false

    - name: 3. 최종 결과 출력 (Dead 상태 확인)
      ansible.builtin.debug:
         msg: 
           - "현재 방화벽 상세 상태: {{ fw_sub_status.stdout }}"
           - "결과: 만약 상세 상태가 'SubState=dead'라면 성공적으로 내려간 것입니다."