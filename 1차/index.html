<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Kojel 협력사 관리</title>
    <style>
        /* 기존 스타일 유지 */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            display: flex; 
            background-color: #f4f7f6; 
            min-height: 100vh;
        }
        .sidebar {
            width: 250px;
            background-color: #2c3e50;
            color: white;
            padding-top: 30px;
            position: fixed; 
            height: 100%;
        }
        .sidebar h2 {
            text-align: center;
            font-size: 1.2em;
            margin-bottom: 30px;
            color: #ecf0f1;
        }
        .sidebar a {
            display: block;
            padding: 15px 25px;
            color: #bdc3c7;
            text-decoration: none;
            transition: 0.3s;
            border-left: 4px solid transparent;
        }
        .sidebar a:hover {
            background-color: #34495e;
            color: white;
        }
        .sidebar a.active {
            background-color: #34495e;
            color: white;
            border-left: 4px solid #059669;
        }
        .main-content {
            margin-left: 250px; 
            flex-grow: 1;
            padding: 50px;
            display: flex;
            justify-content: center;
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            width: 100%;
            max-width: 450px;
            height: fit-content;
        }
        h2.form-title { text-align: center; color: #333; margin-top: 0; }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9em; color: #666; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        /* 읽기 전용(readonly) 입력창 배경색 조절 */
        input[readonly] { background-color: #f9f9f9; color: #888; cursor: not-allowed; }
        button { width: 100%; padding: 12px; background-color: #059669; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1em; margin-top: 10px; }
        button:hover { background-color: #047857; }
        .alert { padding: 10px; margin-bottom: 20px; border-radius: 4px; background-color: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; text-align: center; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>관리자 메뉴</h2>
        <a href="/login">로그인</a>
        <a href="/insert" class="active">협력사 정보 등록</a>
        <a href="/users">협력사 등록 정보 목록</a>
        <a href="/mail">메일 발송</a>
        <a href="/inbox">수신함</a>
        <a href="/sent">발신함</a>
        <a href="/delete">협력사 등록 정보 삭제 </a>
    </div>

    <div class="main-content">
        <div class="container">
            <h2 class="form-title">협력사 정보 등록</h2>

            {% if msg %}
                <div class="alert">{{ msg }}</div>
            {% endif %}

            <form action="/insert" method="POST">
                <div class="form-group">
                    <label>아이디(ex. hgd1000)</label>
                    <input type="text" id="user_id" name="user_id" oninput="updateEmail()" required>
                </div>
                
                <div class="form-group"><label>비밀번호</label><input type="password" name="password" required></div>
                <div class="form-group"><label>이름(ex. First name : Gildong)</label><input type="text" name="username" required></div>
                
                <div class="form-group">
                    <label>이메일</label>
                    <input type="email" id="email" name="email" readonly placeholder="아이디 입력 시 자동 생성">
                </div>
                
                <div class="form-group">
                    <label>생년월일</label>
                    <input type="date" id="birthday" name="birthday" onchange="calculateAge()">
                </div>
                
                <div class="form-group">
                    <label>나이</label>
                    <input type="number" id="age" name="age">
                </div>
                
                <div class="form-group"><label>부서</label><input type="text" name="department"></div>
                <div class="form-group"><label>협력사 인증 번호(ex. C123456)</label><input type="text" name="emp_number" required></div>
                <button type="submit">협력사 정보 등록</button>
            </form>
        </div>
    </div>

    <script>
        // 이메일 자동 완성 함수
        function updateEmail() {
            const userId = document.getElementById('user_id').value;
            const emailField = document.getElementById('email');
            const domain = "@withkojel.com";

            if (userId) {
                // 아이디 뒤에 도메인을 붙여서 이메일 필드에 삽입
                emailField.value = userId + domain;
            } else {
                emailField.value = "";
            }
        }

        // 나이 계산 함수
        function calculateAge() {
            const birthdayValue = document.getElementById('birthday').value;
            const ageInput = document.getElementById('age');

            if (birthdayValue) {
                const birthDate = new Date(birthdayValue);
                const today = new Date();
                let age = today.getFullYear() - birthDate.getFullYear();
                ageInput.value = age;
            }
        }
    </script>
</body>
</html>
