                <span class="user-id">{{ email }}</span>님 접속 중
            </div>
            <a href="/logout" class="logout-btn">로그아웃</a>
        </div>

        <div class="main-content">
            <h2 class="page-title">📈 일일 시장 과열 분석</h2>
            
            <div class="search-box">
                <form action="/stock" method="POST">
                    <div style="display: flex; gap: 15px; align-items: flex-end;">
                        <div>
                            <label>날짜 선택</label><br>
                            <input type="date" name="target_date" value="{{ selected_date }}" required>
                        </div>
                        <div>
                            <label>시장 선택</label><br>
                            <select name="market">
                                {% for m in markets %}
                                <option value="{{ m }}" {% if m == selected_market %}selected{% endif %}>{{ m }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <button type="submit" style="background:#059669; color:white; border:none; padding:8px 20px; border-radius:4px; cursor:pointer;">데이터 조회</button>
                    </div>
                </form>
            </div>

            <div class="table-section">
                <div class="nav-tabs">
                    <button class="nav-link active" onclick="showTab('bull')">Bull <span class="badge bg-bull">{{ counts.bull }}</span></button>
                    <button class="nav-link" onclick="showTab('bear')">Bear <span class="badge bg-bear">{{ counts.bear }}</span></button>
                    <button class="nav-link" onclick="showTab('sell')">Sell <span class="badge bg-sell">{{ counts.sell }}</span></button>
                </div>

                <div id="bull" class="tab-content">{{ tables.bull | safe if tables.bull else "검색 결과가 없습니다." }}</div>
                <div id="bear" class="tab-content" style="display:none;">{{ tables.bear | safe if tables.bear else "검색 결과가 없습니다." }}</div>
                <div id="sell" class="tab-content" style="display:none;">{{ tables.sell | safe if tables.sell else "검색 결과가 없습니다." }}</div>
            </div>
        </div>

        <script>
            function showTab(tabName) {
                document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                document.getElementById(tabName).style.display = 'block';
                event.currentTarget.classList.add('active');
            }
        </script>
        </body>
        </html>