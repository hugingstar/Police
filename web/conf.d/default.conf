    server {
        # 80 포트 관련
        listen 80;
        server_name kojel.com www.kojel.com; 
        return 301 https://$host$request_uri; 
    }

    server {
        # 443 포트 관련
        listen 443 ssl;
        server_name kojel.com www.kojel.com;
        charset utf-8;

        ssl_certificate /etc/nginx/ssl/tls.crt;
        ssl_certificate_key /etc/nginx/ssl/tls.key;
        
        # python 파일 접근 방지 
        location ~ \.py$ {
        deny all;
        }
        
        # html 경로 설정
        # location / {
            # root /usr/share/nginx/html/templates;
            # index login.html;
        # }

        # location / {
        #     root /usr/share/nginx/html;
            
        #     # 1. 기본 접속 시 보여줄 파일
        #     index templates/login.html;

        #     # 2. 찾는 순서 정의
        #     # $uri: 파일이 있는지 확인 (예: /templates/insert.html)
        #     # $uri.html: 확장자 없이 들어왔을 때 .html 붙여서 확인 (예: /templates/insert)
        #     # /templates$uri: templates 폴더 안에서 확인
        #     # /templates$uri.html: templates 폴더 안에서 .html 붙여서 확인
        #     # 마지막: 다 없으면 login.html로 이동
        #     try_files $uri $uri.html /templates$uri /templates$uri.html /templates/login.html;
        # }

        # Porxy : WAS와의 통신
        location / {
            proxy_pass http://was-service.was.svc.cluster.local:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }
    }