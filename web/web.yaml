---
- name: Web Server (Apache & Python FastAPI) 완벽 구성
  hosts: web_servers
  become: yes
  vars:
    web_root: "/var/www/html/FastWeb"
    python_packages:
      - fastapi
      - uvicorn
      - pandas
      - numpy
      - pymysql
      - sqlalchemy
      - python-multipart

  tasks:
    ## 1. 아파치 및 파이썬 기본 설치
    - name: 1. 시스템 패키지 설치 (httpd, python)
      dnf:
        name: [httpd, python3, python3-pip, python3-devel]
        state: present

    ## 2. Python 의존성 라이브러리 설치 (pip list 기반)
    - name: 2. Python 앱 의존성 패키지 설치
      pip:
        name: "{{ python_packages }}"
        state: present

    ## 3. 디렉토리 및 권한 설정
    - name: 3. 웹 디렉토리 생성 및 소유권 변경 (apache)
      file:
        path: "{{ web_root }}"
        state: directory
        owner: apache
        group: apache
        mode: '0755'
        recurse: yes

    ## 4. 가상 호스트 및 프록시 설정
    - name: 4. Apache 프록시 설정 작성
      copy:
        dest: /etc/httpd/conf.d/virtualhost.conf
        content: |
          <VirtualHost *:80>
              DocumentRoot "{{ web_root }}"
              
              # 80포트로 들어온 요청을 Python WAS(8000)로 전달
              ProxyPass / http://localhost:8000/
              ProxyPassReverse / http://localhost:8000/
              
              <Directory "{{ web_root }}">
                  Options Indexes FollowSymLinks
                  AllowOverride None
                  Require all granted
              </Directory>
          </VirtualHost>

    ## 5. 서비스 재시작
    - name: 5. Apache 서비스 재시작
      service:
        name: httpd
        state: restarted
        enabled: yes

    ## 6. Python WAS 실행 (Background)
    - name: 6. FastAPI 서버 실행 (main.py)
      shell: |
        cd {{ web_root }}
        nohup python3 main.py > was_log.txt 2>&1 &
      async: 10
      poll: 0