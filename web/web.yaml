apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: web
data:
  default.conf: |
    server {
        listen 80;
        server_name kojel.com www.kojel.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name kojel.com www.kojel.com;
        charset utf-8;

        ssl_certificate /etc/nginx/ssl/tls.crt;
        ssl_certificate_key /etc/nginx/ssl/tls.key;

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html; # 여러 개의 HTML 파일 접근 허용
        }

        location /api {
            proxy_pass http://localhost:8000/;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastweb-combined
  namespace: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-service
  template:
    metadata:
      labels:
        app: web-service
    spec:
      dnsPolicy: "None"
      dnsConfig:
        nameservers:
          - 10.22.0.3
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
        - containerPort: 443
        volumeMounts:
        - name: nginx-conf-vol
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        - name: static-files-vol
          mountPath: /usr/share/nginx/html # 8개의 HTML 파일이 들어가는 곳
        - name: ssl-certs
          mountPath: "/etc/nginx/ssl"
          readOnly: true
      
      - name: fastapi
        image: python:3.9-slim
        workingDir: /app
        command: ["/bin/sh", "-c"]
        args:
          - |
            pip install fastapi uvicorn
            # 3개의 PY 파일이 이미 /app 폴더에 있으므로 바로 실행
            uvicorn main:app --host 0.0.0.0 --port 8000
        volumeMounts:
        - name: static-files-vol
          mountPath: /app # 3개의 PY 파일이 들어가는 곳

      volumes:
      - name: nginx-conf-vol
        configMap:
          name: nginx-config
      - name: static-files-vol
        configMap:
          name: web-all-files # 사전 준비에서 만든 ConfigMap 이름
      - name: ssl-certs
        secret:
          secretName: kojel-tls-secret
          
---
apiVersion: v1
kind: Service
metadata:
  name: login-service
  namespace: web
  annotations:
    metallb.io/loadBalancerIPs: 10.22.0.10
spec:
  type: LoadBalancer
  selector:
    app: web-service
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
    - name: https
      protocol: TCP
      port: 443
      targetPort: 443