---


---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-server
  namespace: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-service
  template:
    metadata:
      labels:
        app: web-service
    spec:
      dnsPolicy: "None"
      dnsConfig:
        nameservers:
          - 10.22.0.3
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
        - containerPort: 443

        volumeMounts:
        - name: config-vol
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        - name: config-vol
          mountPath: /usr/share/nginx/html/templates/login.html
          subPath: login.html
        - name: config-vol
          mountPath: /usr/share/nginx/html/templates/index.html
          subPath: index.html
        - name: config-vol
          mountPath: /usr/share/nginx/html/templates/stock.html
          subPath: stock.html
        - name: config-vol
          mountPath: /usr/share/nginx/html/templates/list.html
          subPath: list.html
        - name: config-vol
          mountPath: /usr/share/nginx/html/templates/mail.html
          subPath: mail.html
        - name: config-vol
          mountPath: /usr/share/nginx/html/templates/inbox.html
          subPath: inbox.html
        - name: config-vol
          mountPath: /usr/share/nginx/html/templates/sent.html
          subPath: sent.html
        - name: config-vol
          mountPath: /usr/share/nginx/html/templates/delete.html
          subPath: delete.html
        - name: ssl-certs
          mountPath: "/etc/nginx/ssl"
          readOnly: true

      volumes:
      - name: config-vol
        configMap:
          name: nginx-config
      - name: ssl-certs
        secret:
          secretName: kojel-tls-secret

---
apiVersion: v1
kind: Service
metadata:
  name: web-service
  namespace: web
  annotations:
    metallb.io/loadBalancerIPs: 10.22.0.10
spec:
  type: LoadBalancer
  selector:
    app: web-service
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
    - name: https
      protocol: TCP
      port: 443
      targetPort: 443