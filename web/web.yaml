---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-service
  namespace: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-service
  template:
    metadata:
      labels:
        app: web-service
    spec:
      dnsPolicy: "ClusterFirst"
      containers:
      - name: nginx
        image: nginx:latest
        # 디버깅
        command: ["sleep"]
        args: ["infinity"]
        ports:
        - containerPort: 80
        - containerPort: 443
        - containerPort: 8000
        volumeMounts:
        - name: config-vol
          mountPath: /etc/nginx/conf.d 
          subPath: jjh/web/conf.d
        - name: static-vol
          mountPath: /usr/share/nginx/html
          subPath: jjh/web/html
        - name: ssl-certs
          mountPath: "/etc/nginx/ssl"
          readOnly: true
      volumes:
      - name: config-vol
        persistentVolumeClaim:
          claimName: nfs-pvc-web-jjh # /root/nfs_node/static
      - name: static-vol
        persistentVolumeClaim:
          claimName: nfs-pvc-web-jjh # /root/nfs_node/static
      - name: ssl-certs
        secret:
          secretName: kojel-tls-secret

---
apiVersion: v1
kind: Service
metadata:
  name: web-service
  namespace: web
  annotations:
    metallb.io/loadBalancerIPs: 10.22.0.10
spec:
  type: LoadBalancer
  selector:
    app: web-service
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
    - name: https
      protocol: TCP
      port: 443
      targetPort: 443
    - name: was-port
      port: 8000
      targetPort: 8000