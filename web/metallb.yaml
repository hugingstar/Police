apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: ippool-web
  namespace: metallb-system
spec:
  addresses:
  - 10.22.0.10-10.22.0.200
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: l2adv-web
  namespace: metallb-system
spec:
  # Layer 2(ARP) 광고
  ipAddressPools:
  - ippool-web
