apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastweb
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fastapi  
  template:
    metadata:
      labels:
        app: fastapi
    spec:
      containers:
      - name: fastapi
        image: python:3.9-slim
        command: ["python3", "main.py"]
        ports:
        - containerPort: 8000  
      dnsPolicy: "None"
      dnsConfig:
        nameservers:
          - 10.22.0.3  
        searches:
          - kojel.com