---
- name: DNS 서버 완전 자동화 구축 
  hosts: dns_servers
  become: yes
  tasks:
    - name: 1. 기존 환경 정리
      shell: |
        dnf remove -y bind-chroot
        rm -f /etc/named.conf /var/named/kojel.com.dns
      ignore_errors: yes

    - name: 2. BIND 및 유틸리티 설치
      dnf:
        name: [bind, bind-utils]
        state: present

    - name: 3. named.conf 자동 생성
      copy:
        dest: /etc/named.conf
        content: |
          options {
              listen-on port 53 { any; };
              directory "/var/named";
              allow-query { any; };
              recursion yes;
              dnssec-validation no;
          };
          include "/etc/named.kojel.zones";
        owner: root
        group: named
        mode: '0644'

    - name: 4. Zone 설정 자동 추가
      copy:
        dest: /etc/named.kojel.zones
        content: |
          zone "kojel.com" IN {
              type master;
              file "kojel.com.dns";
              allow-update { none; };
          };
        owner: root
        group: named
        mode: '0644'

    - name: 5. 도메인 레코드 파일(kojel.com.dns) 자동 생성
      copy:
        dest: /var/named/kojel.com.dns
        owner: root
        group: named
        mode: '0640'
        content: |
          $TTL 1D
          @ IN SOA ns1.kojel.com. root.kojel.com. ( 0 1D 1H 1W 3H )
          @ IN NS  ns1.kojel.com.
          @ IN MX 10 mail.kojel.com.
          ns1  IN A  10.22.0.3
          www  IN A  10.22.0.4
          mail IN A  10.22.0.2

    - name: 6. 서비스 시작 및 자동 재시작 활성화
      service:
        name: named
        state: restarted
        enabled: yes