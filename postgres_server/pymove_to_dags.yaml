---
- name: Move specific file from one folder to another
  hosts: airflow  # 대상 서버 호스트 그룹명으로 변경 가능
  tasks:
    - name: Copy the file to the destination
      ansible.builtin.copy:
        src: /root/Police/postgres_server/dag_kospi.py
        dest: /root/Cronjob/dags/dag_kospi.py
        mode: '0777'