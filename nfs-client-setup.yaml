- name: Setup NFS Client and Connectivity Test on Worker Nodes
  hosts: nodes
  become: true 
  vars: 
    nfs_server_ip: "10.15.0.170"
  
  tasks: 
    - name: Install NFS Client Package
      apt:
        name: nfs-common 
        state: present
        update_cache: yes
    
    - name: Veryfy network connectivity to NFS server on port 2049
      wait_for:
        host: "{{ nfs_server_ip }}"
        port: 2049
        timeout: 5

    - name: Check available NFS export shares from server 
      command: "showmount -e {{ nfs_server_ip }}"
      register: showmount_result
      changed_when: false 

    - name: Display NFS export verification results
      debug: 
        msg: "NFS Connectivity Verified: {{ showmount_result.stdout }}"