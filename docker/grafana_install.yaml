---
- name: Deploy Airflow Monitoring Stack (Prometheus, Grafana, & cAdvisor)
  hosts: airflow
  become: yes
  vars:
    dest_path: "/root/Cronjob"
    networks:
      - trade_kospi_network
      - trade_kosdaq_network
      - trade_nasdaq_network
      - trade_nyse_network

  tasks:
    - name: "1. Create Prometheus Configuration File (Added cAdvisor)"
      ansible.builtin.copy:
        dest: "{{ dest_path }}/prometheus.yml"
        content: |
          global:
            scrape_interval: 15s
          scrape_configs:
            - job_name: 'airflow-statsd'
              static_configs:
                - targets: ['statsd-exporter:9102']
            
            # 컨테이너 리소스(CPU/메모리) 수집을 위한 설정 추가
            - job_name: 'container-metrics'
              static_configs:
                - targets: ['cadvisor:8080']
        mode: '0644'

    - name: "2. Create docker-compose-monitor.yaml (Added cAdvisor)"
      ansible.builtin.copy:
        dest: "{{ dest_path }}/docker-compose-monitor.yaml"
        content: |
          version: '3.8'
          services:
            # StatsD Exporter: Airflow 애플리케이션 메트릭
            statsd-exporter:
              image: prom/statsd-exporter:latest
              container_name: airflow-statsd-exporter
              restart: always
              expose:
                - "9102"
              ports:
                - "8125:8125/udp"
              networks:
                - trade_kospi_network
                - trade_kosdaq_network
                - trade_nasdaq_network
                - trade_nyse_network

            # cAdvisor: 컨테이너 리소스 모니터링 (추가됨)
            cadvisor:
              image: gcr.io/cadvisor/cadvisor:latest
              container_name: airflow-cadvisor
              restart: always
              privileged: true
              volumes:
                - /:/rootfs:ro
                - /var/run:/var/run:rw
                - /sys:/sys:ro
                - /var/lib/docker/:/var/lib/docker:ro
              networks:
                - trade_kospi_network

            # Prometheus: 시계열 데이터 저장
            prometheus:
              image: prom/prometheus:latest
              container_name: airflow-prometheus
              restart: always
              volumes:
                - ./prometheus.yml:/etc/prometheus/prometheus.yml
              ports:
                - "9090:9090"
              networks:
                - trade_kospi_network

            # Grafana: 데이터 시각화
            grafana:
              image: grafana/grafana:latest
              container_name: airflow-grafana
              restart: always
              ports:
                - "3000:3000"
              environment:
                - GF_SECURITY_ADMIN_PASSWORD=admin
              networks:
                - trade_kospi_network

          networks:
            trade_kospi_network:
              external: true
            trade_kosdaq_network:
              external: true
            trade_nasdaq_network:
              external: true
            trade_nyse_network:
              external: true
        mode: '0644'

    - name: "3. Update Airflow .env to enable Metrics"
      ansible.builtin.blockinfile:
        path: "{{ dest_path }}/.env"
        marker: "# {mark} ANSIBLE MANAGED MONITORING"
        block: |
          AIRFLOW__METRICS__STATS_D_ON=True
          AIRFLOW__METRICS__STATS_D_HOST=statsd-exporter
          AIRFLOW__METRICS__STATS_D_PORT=8125
          AIRFLOW__METRICS__STATS_D_PREFIX=airflow

    - name: "4. Restart Monitoring Stack"
      ansible.builtin.shell:
        cmd: "docker compose -f docker-compose-monitor.yaml up -d"
        chdir: "{{ dest_path }}"

    - name: "5. Check if Monitoring Containers are running"
      ansible.builtin.shell:
        cmd: "docker ps --filter name=airflow-"
      register: docker_status

    - name: "Show running monitoring containers"
      ansible.builtin.debug:
        msg: "{{ docker_status.stdout_lines }}"