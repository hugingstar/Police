---
- name: Install PostgreSQL 17.7 on Rocky Linux 9
  hosts: airflow
  become: yes
  vars:
    # 설치하고자 하는 정확한 버전 명시
    pg_version: "17"
    pg_full_version: "17.7"

  tasks:
    - name: PostgreSQL PGDG Repository 추가
      dnf:
        name: "https://download.postgresql.org/pub/repos/yum/reporpms/EL-9-x86_64/pgdg-redhat-repo-latest.noarch.rpm"
        state: present
        disable_gpg_check: yes

    - name: 기본 OS 내장 PostgreSQL 모듈 비활성화 (충돌 방지)
      shell: "dnf -qy module disable postgresql"
      ignore_errors: yes

    - name: PostgreSQL {{ pg_full_version }} 서버 및 라이브러리 설치
      dnf:
        # 버전 뒤에 -1PGDG.rhel9 등을 붙이지 않아도 dnf가 가용한 패키지 중 17.7을 찾아 설치합니다.
        name:
          - "postgresql{{ pg_version }}-server-{{ pg_full_version }}"
          - "postgresql{{ pg_version }}-{{ pg_full_version }}"
          - "postgresql{{ pg_version }}-libs-{{ pg_full_version }}"
        state: present

    - name: Initialize clusters (최초 1회)
      command: "/usr/pgsql-{{ pg_version }}/bin/postgresql-{{ pg_version }}-setup initdb"
      args:
        creates: "/var/lib/pgsql/{{ pg_version }}/data/PG_VERSION"

    - name: Start PostgreSQL
      systemd:
        name: "postgresql-{{ pg_version }}"
        state: started
        enabled: yes

    - name: Version check
      command: psql --version
      register: installed_version
      changed_when: false

    - name: Complete message
      debug:
        msg: "설치 완료: {{ installed_version.stdout }}"