---
- name: Add Prometheus and Grafana Monitoring to Airflow
  hosts: airflow
  become: yes
  vars:
    dest_path: "/root/Cronjob"
    airflow_version: "2.10.2"
    additional_packages: "finance-datareader pandas numpy psycopg2-binary DateTime ta schedule comtypes natsort scipy"
    market_map_path: "/root/Police/postgres_server/market"
    result_map_path: "/root/Data"
    airflow_uid: "50000"
    # 모니터링 주소
    monitoring_conf_path: "{{ dest_path }}/monitoring"
    
  tasks:
    - name: "Check if {{ dest_path }} exists"
      ansible.builtin.stat:
        path: "{{ dest_path }}"
      register: dest_path_stat

    - name: "Create airflow directory architecture"
      ansible.builtin.file:
        path: "{{ dest_path }}"
        state: directory
        owner: "{{ airflow_uid }}"
        group: "0" # root group
        mode: '0775'
      when: not dest_path_stat.stat.exists  # 디렉토리가 존재하지 않을 때만 실행

    - name: "Create airflow and monitoring directory architecture"
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ airflow_uid }}"
        group: "0"
        mode: '0775'
      with_items:
        - "{{ dest_path }}"
        - "{{ dest_path }}/dags"
        - "{{ dest_path }}/logs"
        - "{{ dest_path }}/plugins"
        - "{{ monitoring_conf_path }}"
        - "{{ monitoring_conf_path }}/prometheus"
    
    - name: "Create result and market data directories with correct permissions"
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ airflow_uid }}"
        group: "0"
        mode: '0775'
        recurse: yes
      with_items:
        - "{{ result_map_path }}"
        - "{{ market_map_path }}"

    - name: "Get airflow docker-compose.yaml file"
      ansible.builtin.get_url:
        url: "https://airflow.apache.org/docs/apache-airflow/{{ airflow_version }}/docker-compose.yaml"
        dest: "{{ dest_path }}/docker-compose.yaml"
        mode: '0664'
        force: no

    - name: "Create Prometheus Configuration"
      ansible.builtin.copy:
        dest: "{{ monitoring_conf_path }}/prometheus/prometheus.yml"
        content: |
          global:
            scrape_interval: 15s
          scrape_configs:
            - job_name: 'prometheus'
              static_configs:
                - targets: ['localhost:9090']
            - job_name: 'node-exporter'
              static_configs:
                - targets: ['node-exporter:9100']
            - job_name: 'airflow'
              metrics_path: '/metrics'
              static_configs:
                - targets: ['airflow-webserver:8080']
        mode: '0644'
    
    - name: "Add Monitoring Services to docker-compose.yaml"
      ansible.builtin.blockinfile:
        path: "{{ dest_path }}/docker-compose.yaml"
        marker: "# {mark} ANSIBLE MANAGED MONITORING SERVICES"
        insertafter: 'services:'
        block: |
          # Node Exporter: 시스템(CPU, RAM, Disk) 메트릭 수집
          node-exporter:
            image: prom/node-exporter:latest
            container_name: node-exporter
            restart: always
            volumes:
              - /proc:/host/proc:ro
              - /sys:/host/sys:ro
              - /:/rootfs:ro
            command:
              - '--path.procfs=/host/proc'
              - '--path.rootfs=/rootfs'
              - '--path.sysfs=/host/sys'
              - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
            networks:
              - default

          # Prometheus: 데이터 수집 및 저장
          prometheus:
            image: prom/prometheus:latest
            container_name: prometheus
            restart: always
            volumes:
              - {{ monitoring_conf_path }}/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
            ports:
              - "9090:9090"
            networks:
              - default

          # Grafana: 시각화 도구
          grafana:
            image: grafana/grafana:latest
            container_name: grafana
            restart: always
            ports:
              - "3000:3000"
            environment:
              - GF_SECURITY_ADMIN_PASSWORD=admin
            networks:
              - default
    
    - name: "Change LOAD_EXAMPLES to False in docker-compose.yaml"
      ansible.builtin.replace:
        path: "{{ dest_path }}/docker-compose.yaml"
        regexp: "AIRFLOW__CORE__LOAD_EXAMPLES: 'true'"
        replace: "AIRFLOW__CORE__LOAD_EXAMPLES: 'false'"

    - name: "Add market data volume to docker-compose.yaml"
      ansible.builtin.replace:
        path: "{{ dest_path }}/docker-compose.yaml"
        regexp: '(\s+)- \$\{AIRFLOW_PROJ_DIR:-\.\}/plugins:/opt/airflow/plugins'
        replace: |
          \1- ${AIRFLOW_PROJ_DIR:-.}/plugins:/opt/airflow/plugins
          \1- {{ market_map_path }}:/opt/airflow/data/market
          \1- {{ result_map_path }}:/opt/airflow/data/Data
    
    - name: "Add networks to all airflow services"
      ansible.builtin.replace:
        path: "{{ dest_path }}/docker-compose.yaml"
        # 4가지 서비스 이름을 (A|B|C|D) 형태로 묶어 한 번에 매칭합니다.
        regexp: '(^[ ]+airflow-(?:webserver|scheduler|worker|triggerer):[\s\S]*?restart: always)'
        replace: |
          \1
              networks:
                - default
                - trade_kospi_network
                - trade_kosdaq_network
                - trade_nasdaq_network
                - trade_nyse_network
    
    - name: "Define external networks at the end of docker-compose.yaml"
      ansible.builtin.blockinfile:
        path: "{{ dest_path }}/docker-compose.yaml"
        marker: "# {mark} ANSIBLE MANAGED NETWORKS"
        insertafter: EOF
        block: |
          networks:
            trade_kospi_network:
              external: true
            trade_kosdaq_network:
              external: true
            trade_nasdaq_network:
              external: true
            trade_nyse_network:
              external: true
    
    - name: "Create or Update .env file (Force disable examples)"
      ansible.builtin.copy:
        dest: "{{ dest_path }}/.env"
        content: |
          AIRFLOW_UID={{ airflow_uid }}
          _PIP_ADDITIONAL_REQUIREMENTS={{ additional_packages }}
          AIRFLOW__CORE__LOAD_EXAMPLES=False
          AIRFLOW__CORE__DEFAULT_TIMEZONE=Asia/Seoul
          AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE=Asia/Seoul
          AIRFLOW__CORE__EXPOSE_CONFIG=True
          AIRFLOW__METRICS__EXPOSE_CONFIG=True
          AIRFLOW__METRICS__PROMETHEUS_METRICS_ENABLED=True
        mode: '0644'
    
    - name: "Initialize Airflow Database"
      ansible.builtin.shell:
        cmd: "docker compose up airflow-init"
        chdir: "{{ dest_path }}"
    
    - name: "Install airflow using docker-compose.yaml file"
      ansible.builtin.shell:
        cmd: "docker compose up -d --build" # --build 옵션 추가 권장
        chdir: "{{ dest_path }}"