---
- name: Airflow installation
  hosts: yslee
  become: yes
  vars:
    dest_path: "/root/Cronjob"
    airflow_version: "3.1.7" 

  tasks:
    - name: "Init"
      ansible.builtin.file:
        path: "{{ dest_path }}"
        state: absent  # 먼저 삭제
  
    - name: "Airflow directory architecture"
      ansible.builtin.file:
        path: "{{ dest_path }}"
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: "Airflow directory architecture"
      ansible.builtin.file:
        path: "{{ dest_path }}/{{ item }}"
        state: directory
        owner: root
        group: root
        mode: '0755'
      with_items:
        - 'dags'
        - 'logs'
        - 'plugins'
      
    - name: "Get airflow docker-compose.yaml file"
      ansible.builtin.get_url:
        url: "https://airflow.apache.org/docs/apache-airflow/{{ airflow_version }}/docker-compose.yaml"
        dest: "{{ dest_path }}/docker-compose.yaml"
        mode: '0644'
        force: no
    
    - name: "Create .env file with AIRFLOW_UID"
      ansible.builtin.shell: |
        echo "AIRFLOW_UID=$(id -u)" > {{ dest_path }}/.env
      args:
        creates: "{{ dest_path }}/.env"

    - name: Install airflow using docker-compose.yaml file
      ansible.builtin.shell:
        cmd: "docker compose up -d"
        chdir: "{{ dest_path }}"