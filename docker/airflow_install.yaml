---
- name: Airflow installation
  hosts: airflow
  become: yes
  vars:
    dest_path: "/root/Cronjob"
    airflow_version: "2.10.2"
    additional_packages: "finance-datareader pandas numpy psycopg2-binary"
    market_map_path: "/root/Police/postgres_server/market"

  tasks:
    - name: "Create airflow directory architecture"
      ansible.builtin.file:
        path: "{{ dest_path }}"
        state: directory
        owner: root
        group: root
        mode: '0777'

    - name: "Airflow directory subdirectories (dags, logs, plugins)"
      ansible.builtin.file:
        path: "{{ dest_path }}/{{ item }}"
        state: directory
        owner: root
        group: root
        mode: '0777'
      with_items:
        - 'dags'
        - 'logs'
        - 'plugins'
      
    - name: "Get airflow docker-compose.yaml file"
      ansible.builtin.get_url:
        url: "https://airflow.apache.org/docs/apache-airflow/{{ airflow_version }}/docker-compose.yaml"
        dest: "{{ dest_path }}/docker-compose.yaml"
        mode: '0777'
        force: no

    - name: "Add market data volume to docker-compose.yaml"
      ansible.builtin.replace:
        path: "{{ dest_path }}/docker-compose.yaml"
        regexp: '(\s+)- \$\{AIRFLOW_PROJ_DIR:-\.\}/plugins:/opt/airflow/plugins'
        replace: |
          \1- ${AIRFLOW_PROJ_DIR:-.}/plugins:/opt/airflow/plugins
          \1- {{ market_map_path }}:/opt/airflow/data/market
        
    - name: "Add networks to Airflow services (worker, scheduler, webserver, triggerer)"
      ansible.builtin.replace:
        path: "{{ dest_path }}/docker-compose.yaml"
        # 서비스 이름 부분을 변수({{ item }})로 처리하여 반복 적용
        regexp: '^(\s+{{ item }}:.*(\n\s+.*)*?\s+restart: always)'
        replace: |
          \1
                networks:
                  - default
                  - cronjob-default
                  - trade_kospi_network
                  - trade_kosdaq_network
                  - trade_nasdaq_network
                  - trade_nyse_network
      with_items:
        - "airflow-worker"
        - "airflow-scheduler"
        - "airflow-webserver"
        - "airflow-triggerer"
    
    # yaml 하단에 네트워크 정의
    - name: "Define external networks at the end of docker-compose.yaml"
      ansible.builtin.blockinfile:
        path: "{{ dest_path }}/docker-compose.yaml"
        marker: "# {mark} ANSIBLE MANAGED NETWORKS"
        insertafter: EOF
        block: |
          networks:
            trade_kospi_network:
              external: true
            trade_kosdaq_network:
              external: true
            trade_nasdaq_network:
              external: true
            trade_nyse_network:
              external: true
              
    # 환경 변수 설정
    - name: "Create or Update .env file (Force disable examples)"
      ansible.builtin.copy:
        dest: "{{ dest_path }}/.env"
        content: |
          AIRFLOW_UID=50000
          _PIP_ADDITIONAL_REQUIREMENTS={{ additional_packages }}
          AIRFLOW__CORE__LOAD_EXAMPLES=False
          AIRFLOW__CORE__DEFAULT_TIMEZONE=Asia/Seoul
          AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE=Asia/Seoul
        mode: '0777'
    
    - name: "Initialize Airflow Database"
      ansible.builtin.shell:
        cmd: "docker compose up airflow-init"
        chdir: "{{ dest_path }}"
    
    - name: "Install airflow using docker-compose.yaml file"
      ansible.builtin.shell:
        cmd: "docker compose up -d --build" # --build 옵션 추가 권장
        chdir: "{{ dest_path }}"