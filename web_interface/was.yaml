apiVersion: apps/v1
kind: Deployment
metadata:
  name: was-service
  namespace: was
spec:
  replicas: 2
  selector:
    matchLabels:
      app: was-service
  template:
    metadata:
      labels:
        app: was-service
    spec:
      containers:
      - name: was-app
        image: yslee4050/fastapi:py39
        workingDir: /app
        # 디버깅용
        # command: ["sleep"]
        # args: ["infinity"]
        command: ["/bin/sh", "-c"]
        args:
          - |
            cd /usr/share/nginx/html && \
            pip install pymysql pandas && \
            uvicorn main:app --host 0.0.0.0 --port 8000
        ports:
        - containerPort: 8000
        volumeMounts:
        - name: nfs-static-volume
          mountPath: /usr/share/nginx/html
        - name: mail-vol
          mountPath: /mnt/mail_storage
          
      volumes:
      - name: nfs-static-volume
        nfs:
          server: 10.15.0.170
          path: /root/nfs_node/was/yslee/web_interface
      - name: mail-vol
        nfs:
          server: 10.22.0.2
          path: /mnt/mail_storage

---
apiVersion: v1
kind: Service
metadata:
  name: was-service
  namespace: was
spec:
  selector:
    app: was-service
  ports:
    - name: http
      protocol: TCP
      port: 8000       # 서비스 포트
      targetPort: 8000 # 컨테이너 포트
  type: ClusterIP # 내부 통신용