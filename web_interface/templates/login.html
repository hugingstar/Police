<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Kojel Private Equity Fund</title>
    <style>
        /* 기본 레이아웃 설정 */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            display: flex; /* 사이드바와 콘텐츠를 가로로 배치 */
            background-color: #f4f7f6; 
            min-height: 100vh;
        }

        /* 사이드바 스타일 */
        .sidebar {
            width: 250px;
            background-color: #8E86DB;
            color: white;
            padding-top: 30px;
            position: fixed; /* 고정 */
            height: 100%;
        }

        .sidebar h2 {
            text-align: center;
            font-size: 1.2em;
            margin-bottom: 30px;
            color: #ecf0f1;
        }

        .sidebar a {
            display: block;
            padding: 15px 25px;
            color: #bdc3c7;
            text-decoration: none;
            transition: 0.3s;
            border-left: 4px solid transparent;
        }

        .sidebar a:hover {
            background-color: #695fd3;
            color: white;
        }

        .sidebar a.active {
            background-color: #695fd3;
            color: white;
            border-left: 4px solid #695fd3; /* 활성 메뉴 강조 */
        }

        /* 메인 콘텐츠 영역 */
        .main-content {
            margin-left: 250px; /* 사이드바 너비만큼 띄움 */
            flex-grow: 1;
            padding: 50px;
            display: flex;
            justify-content: center;
        }

        /* 기존 컨테이너 스타일 유지 */
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            width: 100%;
            max-width: 450px;
            height: fit-content;
        }

        h2.form-title { text-align: center; color: #333; margin-top: 0; }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9em; color: #666; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #695fd3; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1em; margin-top: 10px; }
        button:hover { background-color: #695fd3; }
        .alert { padding: 10px; margin-bottom: 20px; border-radius: 4px; background-color: #d1fae5; color: #695fd3; border: 1px solid #a7f3d0; text-align: center; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Kojel securities</h2>
        <a href="/login" class="active">로그인</a>
        <a href="/insert">회원 정보 등록</a>
        <a href="/users">커뮤니티</a>
        <a href="/stock">시장 모니터링</a>
        <a href="/market-summary">전체 시장 브리핑</a>
        <a href="/mail">메일 발송</a>
        <a href="/inbox">수신함</a>
        <a href="/sent">발신함</a>
        <a href="/delete">회원 탈퇴</a>
    </div>

    <div class="main-content">
        <div class="container">
            <h2 class="form-title">회원 로그인</h2>

            {% if msg %}
                <div class="alert">{{ msg }}</div>
            {% endif %}

            <form action="/login" method="POST">
                <div class="form-group"><label>아이디(ex. hgd1000)</label><input type="text" name="user_id" required></div>
                <div class="form-group"><label>비밀번호</label><input type="password" name="password" required></div>
                <button type="submit">로그인</button>
            </form>
        </div>
    </div>

</body>
</html>
