- name: Install and enable node exporter
  host: target_nodes
  become: true
  tasks:
    - name: Download prometheus Node Exporter 
      get_url: https://github.com/prometheus/node_exporter/releases/download/v1.10.2/node_exporter-1.10.2.linux-amd64.tar.gz
      dest: /tmp/node_exporter.tar.gz

    - name: Unzip Node Exporter
      src: /tmp/node_exporter.tar.gz
      dest: /tmp
      remote_src: yes
    
    - name: Copy file to /usr/local/bin
      src: /tmp/node_exporter-1.10.2.linux-amd64/node_exporter
      dest: /usr/local/bin/node_exporter
      mode: 755
      remote_src: yes
      setype: bint
      seuser: system_u 

    - name: Copy node_exporter systemd service file 
      template:
        src: ../templates/node-exporter.service.j2
        dest: /etc/systemd/system/node-exporter.service
    
    - name: Start Service 
      systemd_service: 
        name: node-exporter 
        state: started
        enabled: true
        daemon_reload: true 
